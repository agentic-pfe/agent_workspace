<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltis X1 Battery Range</title>
    <link rel="stylesheet" href="battery.css">
</head>
<body>
    <section class="battery-range" aria-labelledby="battery-heading">
        <div class="container">
            <h2 id="battery-heading" class="section-title">Battery & Range</h2>
            
            <div class="specs-grid">
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L13.09 8.26L20 9L13.09 9.74L12 16L10.91 9.74L4 9L10.91 8.26L12 2Z" fill="currentColor"/>
                            <path d="M12 22L10.91 15.74L4 15L10.91 14.26L12 8L13.09 14.26L20 15L13.09 15.74L12 22Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Range</h3>
                        <p class="spec-value">420 <span class="unit">miles</span></p>
                    </div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9V7L15 1H9L3 7V9C3 11.76 5.24 14 8 14V22H16V14C18.76 14 21 11.76 21 9ZM11 11H9V9H11V11ZM13 11H11V9H13V11ZM15 11H13V9H15V11Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Charging Time</h3>
                        <p class="spec-value">25 <span class="unit">minutes</span></p>
                    </div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 20H17C18.1 20 19 19.1 19 18V6C19 4.9 18.1 4 17 4H7C5.9 4 5 4.9 5 6V18C5 19.1 5.9 20 7 20ZM7 6H17V18H7V6Z" fill="currentColor"/>
                            <path d="M12 8H14V16H12V8Z" fill="currentColor"/>
                            <path d="M8 8H10V16H8V8Z" fill="currentColor"/>
                            <path d="M16 8H18V16H16V8Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Battery Capacity</h3>
                        <p class="spec-value">120 <span class="unit">kWh</span></p>
                    </div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 6C13.1 6 14 5.1 14 4C14 2.9 13.1 2 12 2C10.9 2 10 2.9 10 4C10 5.1 10.9 6 12 6ZM12 8C10.9 8 10 8.9 10 10C10 11.1 10.9 12 12 12C13.1 12 14 11.1 14 10C14 8.9 13.1 8 12 8ZM12 14C10.9 14 10 14.9 10 16C10 17.1 10.9 18 12 18C13.1 18 14 17.1 14 16C14 14.9 13.1 14 12 14Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Fast Charging</h3>
                        <p class="spec-value">250 <span class="unit">kW</span></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
