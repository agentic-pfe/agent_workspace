<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltis X1 Safety Features</title>
    <link rel="stylesheet" href="safety.css">
</head>
<body>
    <section class="safety-features" aria-labelledby="safety-heading">
        <div class="container">
            <h2 id="safety-heading" class="section-title">Safety Features</h2>
            
            <div class="specs-grid">
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1ZM12 11.99H19C18.47 16.11 15.79 19.78 12 20.93V12H5V6.34L12 3.19V11.99Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Safety Rating</h3>
                        <p class="spec-value">5 <span class="unit">Stars</span></p>
                    </div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20ZM12.5 7H11V13L16.25 16.15L17 14.92L12.5 12.25V7Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Adaptive Cruise</h3>
                        <p class="spec-value">Yes</p>
                    </div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Lane Assist</h3>
                        <p class="spec-value">Yes</p>
                    </div>
                </div>
                
                <div class="spec-card">
                    <div class="spec-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20ZM13 12L16 14L15.5 15L12 13L8.5 15L8 14L11 12V8H13V12Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="spec-content">
                        <h3 class="spec-title">Emergency Brake</h3>
                        <p class="spec-value">Yes</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
