<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltis X1 Electric SUV</title>
    <link rel="stylesheet" href="hero.css">
</head>
<body>
    <header class="hero">
        <div class="hero-video-container">
            <video 
                autoplay 
                muted 
                loop 
                playsinline 
                aria-hidden="true"
                class="hero-video">
                <source src="voltis-x1-hero.mp4" type="video/mp4">
                <img src="voltis-x1-hero.jpg" alt="Voltis X1 Electric SUV" class="hero-image">
            </video>
        </div>
        
        <div class="hero-content">
            <div class="text-overlay">
                <h1 class="vehicle-name">Voltis X1</h1>
                <p class="tagline">The Future of Electric Mobility</p>
                <div class="cta-buttons">
                    <a href="#features" class="btn btn-primary">Explore Features</a>
                    <a href="#configurator" class="btn btn-secondary">Customize Yours</a>
                </div>
            </div>
        </div>
        
        <div class="scroll-indicator" aria-label="Scroll down">
            <span class="scroll-arrow"></span>
        </div>
    </header>
</body>
</html>
