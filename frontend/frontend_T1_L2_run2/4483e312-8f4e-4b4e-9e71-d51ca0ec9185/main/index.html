<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowdesk - Get More Done</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --accent-color: #f72585;
            --dark-color: #212529;
            --light-color: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            line-height: 1.6;
            color: var(--dark-color);
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1rem;
            background-color: var(--light-color);
            min-height: 80vh;
        }

        .hero-content {
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: var(--dark-color);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--dark-color);
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .hero-cta {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .hero-cta:hover {
            background-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }

        @media (min-width: 1024px) {
            .hero {
                flex-direction: row;
                text-align: left;
                gap: 2rem;
                padding: 6rem 2rem;
            }

            .hero-content {
                align-items: flex-start;
            }

            .hero-title, .hero-subtitle {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Get More Done with Flowdesk</h1>
            <p class="hero-subtitle">The all-in-one workspace for teams who value focus and speed</p>
            <a href="#" class="hero-cta">Start Free Trial</a>
        </div>
    </section>
</body>
</html>
