<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orcheeos Platform Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==================== LOGIN VIEW ==================== -->
  <section id="login-view" class="view" aria-labelledby="login-heading">
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="url(#logo-grad)"/>
            <path d="M14 28l7-14 7 14-7-5-7 5z" fill="#fff" opacity="0.95"/>
            <circle cx="24" cy="16" r="3" fill="#fff"/>
            <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs>
          </svg>
        </div>
        <h1 id="login-heading">Orcheeos Platform</h1>
        <p class="login-subtitle">AI-Powered Workflow Orchestration</p>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <fieldset>
          <legend class="sr-only">Sign in credentials</legend>

          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              placeholder="Enter your username"
              required
              aria-required="true"
            >
            <span class="form-error" id="username-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
              aria-required="true"
            >
            <span class="form-error" id="password-error" role="alert"></span>
          </div>

          <div class="form-error form-error--global" id="login-global-error" role="alert" aria-live="assertive"></div>

          <button type="submit" class="btn btn--primary btn--full" id="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </fieldset>
      </form>

      <p class="login-hint">Demo: use any username with password "<strong>admin</strong>"</p>
    </div>
  </section>

  <!-- ==================== DASHBOARD VIEW ==================== -->
  <main id="dashboard-view" class="view view--hidden" aria-labelledby="dashboard-heading">
    <!-- Top Navigation Bar -->
    <header class="topbar" role="banner">
      <button class="topbar__menu-toggle" id="sidebar-toggle" aria-label="Toggle sidebar" aria-expanded="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h1 id="dashboard-heading" class="topbar__title">Orcheeos Dashboard</h1>
      <div class="topbar__actions">
        <span class="topbar__user" id="current-user-display"></span>
        <button class="btn btn--ghost btn--sm" id="logout-btn" aria-label="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </header>

    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" role="complementary" aria-label="Dashboard panels">
        <!-- Health Check Panel -->
        <section class="panel health-panel" aria-labelledby="health-heading">
          <h2 id="health-heading" class="panel__title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            System Health
          </h2>
          <div class="health-grid" id="health-grid" role="list" aria-live="polite">
            <!-- Populated by JS -->
          </div>
        </section>

        <!-- Files Panel -->
        <section class="panel files-panel" aria-labelledby="files-heading">
          <h2 id="files-heading" class="panel__title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/>
              <polyline points="13,2 13,9 20,9"/>
            </svg>
            Files
          </h2>
          <ul class="file-list" id="file-list" role="list">
            <!-- Populated by JS -->
          </ul>
        </section>
      </aside>

      <!-- Main Content -->
      <div class="main-content">
        <!-- SSE Stream Panel -->
        <section class="panel sse-panel" aria-labelledby="sse-heading">
          <h2 id="sse-heading" class="panel__title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12,6 12,12 16,14"/>
            </svg>
            Live Stream
            <span class="status-dot status-dot--live" id="sse-status" aria-label="Stream status"></span>
          </h2>
          <div class="sse-feed" id="sse-feed" role="log" aria-live="polite" aria-label="Live event stream">
            <p class="sse-placeholder">Connecting to event stream...</p>
          </div>
        </section>

        <!-- Chat Panel -->
        <section class="panel chat-panel" aria-labelledby="chat-heading">
          <h2 id="chat-heading" class="panel__title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            Chat
          </h2>
          <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages">
            <p class="chat-placeholder">No messages yet. Start the conversation!</p>
          </div>
          <form class="chat-form" id="chat-form" aria-label="Send a message">
            <label for="chat-input" class="sr-only">Type your message</label>
            <input
              type="text"
              id="chat-input"
              class="chat-input"
              placeholder="Type a message..."
              autocomplete="off"
              aria-label="Message text"
            >
            <button type="submit" class="btn btn--primary btn--icon" aria-label="Send message">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22,2 15,22 11,13 2,9 22,2"/>
              </svg>
            </button>
          </form>
        </section>
      </div>
    </div>
  </main>

  <!-- ==================== FILE PREVIEW MODAL ==================== -->
  <div class="modal-overlay" id="file-preview-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title" class="modal-title">File Preview</h3>
        <button class="btn btn--ghost btn--icon modal-close" id="modal-close" aria-label="Close preview">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Preview content injected by JS -->
      </div>
      <div class="modal-footer">
        <a class="btn btn--secondary" id="modal-download" download>Download File</a>
        <button class="btn btn--ghost" id="modal-close-btn">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
