<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Forma Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="container">
        <nav class="nav">
            <div class="logo">
                <h1>Forma Studio</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="work.html" class="nav-link">Work</a>
                <a href="contact.html" class="nav-link nav-cta">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        <section id="contact" class="container">
            <h2>Let's Create Something Amazing</h2>
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </section>

        <section id="contact-info" class="container">
            <h2>Contact Information</h2>
            <div class="grid grid-3">
                <div class="card">
                    <h3>Address</h3>
                    <p>123 Design Street, Creative City, DC 90210</p>
                </div>
                <div class="card">
                    <h3>Phone</h3>
                    <p>(555) 123-4567</p>
                </div>
                <div class="card">
                    <h3>Email</h3>
                    <p>hello@formastudio.com</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 Forma Studio. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
