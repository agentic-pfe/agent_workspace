<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
        </header>
        
        <main>
            <section class="task-input-section">
                <input type="text" id="taskInput" placeholder="Add a new task" aria-label="Task input">
                <button id="addTaskBtn" aria-label="Add task">Add Task</button>
            </section>

            <section class="task-filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </section>

            <section class="task-list-section">
                <ul id="taskList" class="task-list" aria-live="polite">
                    <!-- Tasks will be dynamically added here -->
                </ul>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
