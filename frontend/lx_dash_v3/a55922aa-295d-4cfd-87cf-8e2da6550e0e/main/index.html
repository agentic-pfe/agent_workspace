<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orcheeos Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ========== LOGIN MODAL ========== -->
  <div id="login-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="login-title">
    <div class="modal-card">
      <h1 id="login-title" class="modal-title">Welcome to Orcheeos</h1>
      <p class="modal-subtitle">Enter your username to continue</p>
      <form id="login-form" class="login-form" novalidate>
        <label for="login-username" class="sr-only">Username</label>
        <input
          type="text"
          id="login-username"
          class="input-field"
          placeholder="Your username..."
          autocomplete="username"
          required
          minlength="1"
          maxlength="50"
        >
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
    </div>
  </div>

  <!-- ========== SERVER OFFLINE BANNER ========== -->
  <div id="offline-banner" class="offline-banner" role="alert" hidden>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>Server Offline — some features unavailable</span>
  </div>

  <!-- ========== APPLICATION SHELL ========== -->
  <div id="app" class="app-shell">

    <!-- Top Bar -->
    <header id="top-bar" class="top-bar">
      <div class="top-bar-left">
        <span class="brand-name">Orcheeos</span>
        <span id="health-dot" class="health-dot health-unknown" title="Checking server status..." aria-label="Server status unknown"></span>
      </div>
      <div class="top-bar-right">
        <span id="user-display" class="user-display"></span>
        <button id="btn-logout" class="btn btn-ghost btn-sm" type="button">Logout</button>
      </div>
    </header>

    <!-- Body: Sidebar + Main -->
    <div class="body-container">

      <!-- Sidebar -->
      <nav id="sidebar" class="sidebar" aria-label="Chat history">
        <div class="sidebar-header">
          <button id="btn-new-chat" class="btn btn-sidebar-new" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New Task
          </button>
        </div>
        <div id="history-list" class="history-list" role="list" aria-label="Previous tasks">
          <!-- Populated by JS -->
        </div>
        <div id="history-empty" class="history-empty">
          <p>No tasks yet.<br>Start a new task to begin.</p>
        </div>
      </nav>

      <!-- Main Area -->
      <main id="main-area" class="main-area">

        <!-- Chat Panel -->
        <section
          id="chat-panel"
          class="chat-panel"
          role="log"
          aria-live="polite"
          aria-label="Task output"
        >
          <div id="chat-welcome" class="chat-welcome">
            <div class="welcome-icon" aria-hidden="true">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
            </div>
            <h2 class="welcome-title">Orcheeos Agent Dashboard</h2>
            <p class="welcome-text">Select a level and specialty, then describe your task below to get started.</p>
          </div>
        </section>

        <!-- Action Buttons (Preview / Download) -->
        <div id="action-bar" class="action-bar" hidden>
          <button id="btn-preview" class="btn btn-action btn-preview" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            Preview
          </button>
          <button id="btn-download" class="btn btn-action btn-download" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download ZIP
          </button>
        </div>

        <!-- Input Bar -->
        <footer id="input-bar" class="input-bar" role="form" aria-label="Task input">
          <div class="input-bar-inner">
            <div class="input-row">
              <label for="task-input" class="sr-only">Task description</label>
              <input
                type="text"
                id="task-input"
                class="task-input"
                placeholder="Describe your task..."
                autocomplete="off"
                maxlength="2000"
              >
              <button id="btn-run" class="btn btn-run" type="button" disabled>
                <span class="btn-run-text">Run</span>
                <span class="btn-run-spinner" hidden>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                    <path d="M12 2a10 10 0 019.95 9" stroke-linecap="round"/>
                  </svg>
                </span>
              </button>
            </div>
            <div class="input-options">
              <div class="option-group">
                <label for="level" class="option-label">Level</label>
                <select id="level" class="option-select">
                  <option value="levelx" selected>levelx</option>
                  <option value="baseline1">baseline1</option>
                  <option value="baseline2">baseline2</option>
                  <option value="level1b">level1b</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                </select>
              </div>
              <div class="option-group">
                <label for="specialty" class="option-label">Specialty</label>
                <select id="specialty" class="option-select">
                  <option value="frontend" selected>frontend</option>
                  <option value="backend">backend</option>
                  <option value="brand">brand</option>
                  <option value="fullstack">fullstack</option>
                  <option value="research">research</option>
                </select>
              </div>
            </div>
          </div>
        </footer>

      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
