<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your Free E-book</title>
    <link rel="stylesheet" href="cta.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <main>
        <section class="cta-section">
            <div class="cta-container">
                <h1>Get Your Free Copy Now</h1>
                <p>Join thousands of learners who've already downloaded our e-book "Learn to Code in 15 Min"</p>
                
                <form class="cta-form" action="#" method="POST" aria-labelledby="form-heading">
                    <fieldset>
                        <legend id="form-heading" class="sr-only">Email Signup Form</legend>
                        <div class="form-group">
                            <label for="email">Enter your email</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="your@email.com" 
                                required
                                aria-required="true"
                            >
                        </div>
                        <button type="submit" class="download-button">Download Now</button>
                    </fieldset>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
