<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forma Studio - Contact Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <a href="home.html" class="logo" aria-label="Forma Studio Home">Forma</a>
        <nav>
            <button class="mobile-menu-toggle" aria-label="Toggle Navigation" aria-expanded="false">
                <span class="hamburger-icon">☰</span>
            </button>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="work.html">Work</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Let's Build Something Together</h1>
                <p>Ready to transform your digital presence? We're excited to hear about your project.</p>
            </div>
            <div class="hero-image">
                <img src="contact_hero.png" alt="Minimalist contact space with geometric design elements" loading="lazy">
            </div>
        </section>

        <section class="contact-form">
            <div class="container">
                <h2>Start Your Project</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Share your full name — how should we address you?" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Your professional email" required>
                    </div>
                    <div class="form-group">
                        <label for="company">Company</label>
                        <input type="text" id="company" name="company" placeholder="Tell us about your organization and its design needs">
                    </div>
                    <div class="form-group">
                        <label for="project">Project Description</label>
                        <textarea id="project" name="project" placeholder="Describe your project vision, challenges, and goals" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="budget">Budget Range</label>
                        <select id="budget" name="budget">
                            <option value="">What's your estimated budget range?</option>
                            <option value="5k-10k">$5,000 - $10,000</option>
                            <option value="10k-25k">$10,000 - $25,000</option>
                            <option value="25k-50k">$25,000 - $50,000</option>
                            <option value="50k+">$50,000+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="timeline">Project Timeline</label>
                        <select id="timeline" name="timeline">
                            <option value="">When are you looking to start and complete this project?</option>
                            <option value="1-3months">1-3 Months</option>
                            <option value="3-6months">3-6 Months</option>
                            <option value="6-12months">6-12 Months</option>
                            <option value="12months+">12+ Months</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Project Brief</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 Forma Studio. All rights reserved.</p>
            <div class="social-links">
                <a href="#" aria-label="Instagram">Instagram</a>
                <a href="#" aria-label="LinkedIn">LinkedIn</a>
                <a href="#" aria-label="Dribbble">Dribbble</a>
            </div>
        </div>
    </footer>

    <script src="app.js" defer></script>
</body>
</html>
