<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="#1e1e1e"/>
  
  <!-- Primary -->
  <rect x="20" y="20" width="60" height="60" fill="#3d87cc"/>
  <text x="90" y="55" fill="#f4f7f9" font-size="14" font-family="Arial">#3d87cc</text>
  
  <!-- Secondary -->
  <rect x="100" y="20" width="60" height="60" fill="#b75088"/>
  <text x="170" y="55" fill="#f4f7f9" font-size="14" font-family="Arial">#b75088</text>
  
  <!-- Accent (Success) -->
  <rect x="180" y="20" width="60" height="60" fill="#80cc20"/>
  <text x="250" y="55" fill="#1e1e1e" font-size="14" font-family="Arial">#80cc20</text>
  
  <!-- Neutral 100 -->
  <rect x="260" y="20" width="60" height="60" fill="#f4f7f9"/>
  <text x="330" y="55" fill="#1e1e1e" font-size="14" font-family="Arial">#f4f7f9</text>
  
  <!-- Neutral 300 -->
  <rect x="20" y="100" width="60" height="60" fill="#d5d7d8"/>
  <text x="90" y="135" fill="#1e1e1e" font-size="14" font-family="Arial">#d5d7d8</text>
  
  <!-- Neutral 500 -->
  <rect x="100" y="100" width="60" height="60" fill="#8a8b8c"/>
  <text x="170" y="135" fill="#f4f7f9" font-size="14" font-family="Arial">#8a8b8c</text>
  
  <!-- Neutral 700 -->
  <rect x="180" y="100" width="60" height="60" fill="#585859"/>
  <text x="250" y="135" fill="#f4f7f9" font-size="14" font-family="Arial">#585859</text>
  
  <!-- Neutral 900 -->
  <rect x="260" y="100" width="60" height="60" fill="#1e1e1e"/>
  <text x="330" y="135" fill="#f4f7f9" font-size="14" font-family="Arial">#1e1e1e</text>
  
  <!-- Title -->
  <text x="20" y="200" fill="#f4f7f9" font-size="18" font-family="Arial" font-weight="bold">Aymen Tech Palette (Dark Mode)</text>
  
  <!-- Contrast Notes -->
  <text x="20" y="230" fill="#f4f7f9" font-size="12" font-family="Arial">Accent (#80cc20) and Neutral 100 (#f4f7f9) pass AAA</text>
  <text x="20" y="250" fill="#f4f7f9" font-size="12" font-family="Arial">Primary and Secondary need large text for AA</text>
</svg>