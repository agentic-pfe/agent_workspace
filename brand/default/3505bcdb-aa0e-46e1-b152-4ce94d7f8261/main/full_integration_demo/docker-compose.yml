version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_password
      POSTGRES_DB: demo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://demo_user:demo_password@db:5432/demo_db
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  e2e-tests:
    build: ./tests
    depends_on:
      - frontend
      - backend
    environment:
      FRONTEND_URL: http://frontend:3000
      BACKEND_URL: http://backend:8000

volumes:
  postgres_data: