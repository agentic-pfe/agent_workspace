<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <!-- Background circle with subtle circuit pattern -->
  <circle cx="100" cy="50" r="45" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  
  <!-- Abstract neural network lines -->
  <path d="M70,50 Q90,30 110,50 Q130,70 110,50" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
  <path d="M85,50 Q100,25 115,50" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <path d="M90,50 Q100,65 110,50" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  
  <!-- Code bracket motif on left -->
  <path d="M55,35 L55,65 L65,65" fill="none" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Monospaced tech font text -->
  <text x="100" y="85" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#3b82f6" font-weight="600">Aymen</text>
  
  <!-- Subtle AI dot above 'm' -->
  <circle cx="115" cy="40" r="2" fill="#3b82f6"/>
</svg>